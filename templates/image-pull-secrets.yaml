{{- if not .Values.imagePullSecret.existingSecret }}
{{- $registry := required "imagePullSecret.registry is required when imagePullSecret.existingSecret is empty" .Values.imagePullSecret.registry }}
{{- $username := required "imagePullSecret.username is required when imagePullSecret.existingSecret is empty" .Values.imagePullSecret.username }}
{{- $password := required "imagePullSecret.password is required when imagePullSecret.existingSecret is empty" .Values.imagePullSecret.password }}
{{- $email := default "" .Values.imagePullSecret.email }}
{{- $auth := printf "%s:%s" $username $password | b64enc }}
apiVersion: v1
kind: Secret
metadata:
  name: default-secret
  namespace: {{ $.Values.global.namespace | default "disaster-system" }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ dict "auths" (dict $registry (dict "username" $username "password" $password "email" $email "auth" $auth)) | toJson | b64enc | quote }}
{{- end }}
