---
# Source: disaster-server/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: {{ .Values.global.namespace | default "disaster-system" }}
  name: disaster-server
  labels:
    helm.sh/chart: disaster-server-0.1.0
    app.kubernetes.io/name: disaster-server
    app.kubernetes.io/instance: disaster-server
    app.kubernetes.io/version: 0.0.1
    app.kubernetes.io/managed-by: Helm
  annotations:
    {}
---
# Source: disaster-server/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ .Values.global.namespace | default "disaster-system" }}
  name: disaster-server
  labels:
    helm.sh/chart: disaster-server-0.1.0
    app.kubernetes.io/name: disaster-server
    app.kubernetes.io/instance: disaster-server
    app.kubernetes.io/version: 0.0.1
    app.kubernetes.io/managed-by: Helm
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: {{ .Values.server.service.port }}
    log:
      level: debug
    jwt:
      secret: "your-secret-key"
      timeout: 24h
      access_expire: 24h
      refresh_expire: 168h
    license:
      enabled: {{ .Values.license.enabled }}
      namespace: {{ include "disaster-system.licenseNamespace" . | quote }}
      caPath: {{ .Values.license.caPath | quote }}
---
# Source: disaster-server/templates/serviceaccount.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  namespace: {{ .Values.global.namespace | default "disaster-system" }}
  name: disaster-server
  labels:
    helm.sh/chart: disaster-server-0.1.0
    app.kubernetes.io/name: disaster-server
    app.kubernetes.io/instance: disaster-server
    app.kubernetes.io/version: 0.0.1
    app.kubernetes.io/managed-by: Helm
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
# Source: disaster-server/templates/serviceaccount.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  namespace: {{ .Values.global.namespace | default "disaster-system" }}
  name: disaster-server
  labels:
    helm.sh/chart: disaster-server-0.1.0
    app.kubernetes.io/name: disaster-server
    app.kubernetes.io/instance: disaster-server
    app.kubernetes.io/version: 0.0.1
    app.kubernetes.io/managed-by: Helm
  annotations:
    {}
subjects:
  - kind: ServiceAccount
    name: disaster-server
    namespace: {{ .Values.global.namespace | default "disaster-system" }}
roleRef:
  kind: ClusterRole
  name: disaster-server
  apiGroup: rbac.authorization.k8s.io
---
# Source: disaster-server/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.global.namespace | default "disaster-system" }}
  name: disaster-server
  labels: 
    helm.sh/chart: disaster-server-0.1.0
    app.kubernetes.io/name: disaster-server
    app.kubernetes.io/instance: disaster-server
    app.kubernetes.io/version: 0.0.1
    app.kubernetes.io/managed-by: Helm
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector: 
    app.kubernetes.io/name: disaster-server
    app.kubernetes.io/instance: disaster-server
---
# Source: disaster-server/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Values.global.namespace | default "disaster-system" }}
  name: disaster-server
  labels:
    helm.sh/chart: disaster-server-0.1.0
    app.kubernetes.io/name: disaster-server
    app.kubernetes.io/instance: disaster-server
    app.kubernetes.io/version: 0.0.1
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  {{- with .Values.server.strategy }}
  strategy:
{{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: disaster-server
      app.kubernetes.io/instance: disaster-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: disaster-server
        app.kubernetes.io/instance: disaster-server
      annotations:
        {}
    spec:
      serviceAccountName: disaster-server
      imagePullSecrets:
        - name: {{ include "disaster-system.imagePullSecretName" . }}
      containers:
        - name: disaster-server
          env:
            - name: TZ
              value: {{ .Values.global.timezone | default "Asia/Shanghai" | quote }}
          image: "{{ .Values.images.server.repository }}:{{ .Values.images.server.tag }}"
          imagePullPolicy: {{ .Values.images.server.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.server.service.port }}
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.server.service.port }}
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
          resources:
            {}
      volumes:
        - name: config
          configMap:
            name: disaster-server
      nodeSelector:
        {}
      affinity:
        {}
      tolerations:
        []
