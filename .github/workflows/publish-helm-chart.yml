name: Publish Helm chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Chart.yaml
      - values*.yaml
      - templates/**
      - crds/**
      - CHANGELOG.md
      - DEPLOYMENT.md
      - README.md
      - LICENSE
      - .helmignore
      - .github/workflows/publish-helm-chart.yml

permissions:
  contents: write

env:
  HELM_REPO_RELEASE_TAG: helm-repo

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint .

      - name: Build Helm release repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p public
          repo_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${HELM_REPO_RELEASE_TAG}"

          helm package . --destination public
          chart_name="$(awk -F': *' '$1 == "name" {print $2; exit}' Chart.yaml)"
          chart_version="$(awk -F': *' '$1 == "version" {print $2; exit}' Chart.yaml)"
          chart_package="${chart_name}-${chart_version}.tgz"
          if compgen -G "values*.yaml" >/dev/null; then
            cp values*.yaml public/
          fi

          if gh release view "${HELM_REPO_RELEASE_TAG}" >/dev/null 2>&1; then
            gh release download "${HELM_REPO_RELEASE_TAG}" \
              --pattern index.yaml \
              --dir public || true
          fi

          if [ -f public/index.yaml ]; then
            helm repo index public --url "${repo_url}" --merge public/index.yaml
          else
            helm repo index public --url "${repo_url}"
          fi

          printf 'chart_name=%s\n' "${chart_name}" >> "${GITHUB_ENV}"
          printf 'chart_version=%s\n' "${chart_version}" >> "${GITHUB_ENV}"
          printf 'chart_package=%s\n' "${chart_package}" >> "${GITHUB_ENV}"

          notes_file="public/release-notes.md"
          if [ -f CHANGELOG.md ]; then
            awk -v version="${chart_version}" '
              $0 ~ "^##[[:space:]]+" version "([[:space:]]|$|-)" { capture = 1; next }
              capture && $0 ~ "^##[[:space:]]+" { exit }
              capture { print }
            ' CHANGELOG.md > "${notes_file}"
          fi
          if [ ! -s "${notes_file}" ]; then
            {
              printf 'Helm chart release %s.\n\n' "${chart_version}"
              printf -- '- Chart package: %s\n' "${chart_package}"
              printf -- '- Stable Helm repository release: %s\n' "${HELM_REPO_RELEASE_TAG}"
            } > "${notes_file}"
          fi

      - name: Publish Helm repository release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! gh release view "${HELM_REPO_RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${HELM_REPO_RELEASE_TAG}" \
              --title "Helm Chart Repository" \
              --notes "Stable Helm repository assets for ${GITHUB_REPOSITORY}."
          fi

          assets=(public/index.yaml "public/${chart_package}")
          if compgen -G "public/values*.yaml" >/dev/null; then
            while IFS= read -r values_file; do
              assets+=("${values_file}")
            done < <(find public -maxdepth 1 -type f -name 'values*.yaml' | sort)
          fi

          gh release upload "${HELM_REPO_RELEASE_TAG}" "${assets[@]}" --clobber

      - name: Publish version release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version_release_tag="${chart_version}"
          version_assets=("public/${chart_package}" "public/index.yaml")
          if compgen -G "public/values*.yaml" >/dev/null; then
            while IFS= read -r values_file; do
              version_assets+=("${values_file}")
            done < <(find public -maxdepth 1 -type f -name 'values*.yaml' | sort)
          fi

          if gh release view "${version_release_tag}" >/dev/null 2>&1; then
            gh release edit "${version_release_tag}" \
              --title "testudo-chart ${chart_version}" \
              --notes-file public/release-notes.md
            gh release upload "${version_release_tag}" "${version_assets[@]}" --clobber
          else
            gh release create "${version_release_tag}" "${version_assets[@]}" \
              --target "${GITHUB_SHA}" \
              --title "testudo-chart ${chart_version}" \
              --notes-file public/release-notes.md
          fi
